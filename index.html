<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuestionario de IA</title>
    <style>
        /* === ESTILOS (igual que antes, pero lo dejo completo) === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .quiz-container {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 20, 40, 0.15);
            padding: 35px 30px;
            max-width: 820px;
            width: 100%;
            transition: all 0.3s ease;
        }

        h1 {
            text-align: center;
            font-weight: 600;
            font-size: 1.9rem;
            color: #0b2b4a;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        h1 small {
            display: block;
            font-size: 0.9rem;
            font-weight: 400;
            color: #5b6f82;
            margin-top: 4px;
        }

        .quiz-content {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #3d556a;
            border-bottom: 2px solid #eef2f7;
            padding-bottom: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .question-header .counter {
            font-weight: 600;
            background: #e8edf5;
            padding: 4px 16px;
            border-radius: 30px;
        }

        .question-header .score {
            font-weight: 600;
            background: #d4e2f0;
            padding: 4px 16px;
            border-radius: 30px;
            color: #0b2b4a;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 500;
            color: #0b2b4a;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .options-list button {
            width: 100%;
            text-align: left;
            padding: 16px 22px;
            background: #f8faff;
            border: 2px solid #dce4ed;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 450;
            color: #1e2f3f;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
            line-height: 1.4;
        }

        .options-list button:hover:not(:disabled) {
            background: #eef5fc;
            border-color: #9bb7d4;
            transform: scale(1.01);
        }

        .options-list button:disabled {
            cursor: default;
            opacity: 0.9;
        }

        .options-list button.selected-correct {
            background: #d4edda;
            border-color: #28a745;
            color: #145523;
        }

        .options-list button.selected-incorrect {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .options-list button.show-correct {
            background: #d4edda;
            border-color: #28a745;
            color: #145523;
        }

        .feedback {
            margin-top: 20px;
            padding: 16px 20px;
            border-radius: 16px;
            font-weight: 500;
            text-align: center;
            display: none;
            font-size: 1rem;
        }

        .feedback.correct {
            display: block;
            background: #d4edda;
            color: #145523;
            border-left: 6px solid #28a745;
        }

        .feedback.incorrect {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border-left: 6px solid #dc3545;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 28px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .controls button {
            padding: 12px 32px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            background: #1a4b75;
            color: white;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        .controls button:hover:not(:disabled) {
            background: #0e3b5e;
            transform: scale(1.02);
        }

        .controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .controls .progress {
            color: #3d556a;
            font-weight: 500;
            background: #eef2f7;
            padding: 6px 18px;
            border-radius: 30px;
        }

        .result-area {
            display: none;
            text-align: center;
            padding: 30px 10px 20px;
            animation: fadeIn 0.4s ease;
        }

        .result-area h2 {
            font-size: 2.4rem;
            color: #0b2b4a;
            margin-bottom: 6px;
        }

        .result-area .final-score {
            font-size: 3rem;
            font-weight: 700;
            color: #1a4b75;
            background: #e8edf5;
            display: inline-block;
            padding: 10px 40px;
            border-radius: 60px;
            margin: 15px 0;
        }

        .result-area p {
            font-size: 1.1rem;
            color: #2c3e50;
        }

        .restart-btn {
            margin-top: 25px;
            padding: 14px 48px;
            border: none;
            border-radius: 40px;
            background: #1a4b75;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .restart-btn:hover {
            background: #0e3b5e;
        }

        @media (max-width: 600px) {
            .quiz-container {
                padding: 20px 16px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .options-list button {
                padding: 14px 16px;
                font-size: 0.95rem;
            }

            .controls button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="quiz-container" id="app">
        <h1>🧠 Cuestionario IA <small>Inteligencia Artificial · Lógica · Búsqueda</small></h1>

        <!-- Contenido del quiz -->
        <div class="quiz-content" id="quizContent">
            <div class="question-header">
                <span class="counter" id="counter">Pregunta 1 / 200</span>
                <span class="score" id="scoreDisplay">✅ 0 aciertos</span>
            </div>
            <div class="question-text" id="questionText">Cargando pregunta...</div>
            <ul class="options-list" id="optionsList"></ul>
            <div class="feedback" id="feedback"></div>
            <div class="controls">
                <button id="prevBtn" disabled>⬅ Anterior</button>
                <span class="progress" id="progressText">1 / 200</span>
                <button id="nextBtn">Siguiente ➡</button>
            </div>
        </div>

        <!-- Pantalla de resultados -->
        <div class="result-area" id="resultArea">
            <h2>🎉 ¡Terminaste!</h2>
            <div class="final-score" id="finalScore">0</div>
            <p>de <span id="totalQuestions">200</span> preguntas acertadas</p>
            <button class="restart-btn" id="restartBtn">🔄 Volver a empezar</button>
        </div>
    </div>

    <script>
        // ============================================================
        //  🟢 AQUÍ PEGA TU JSON COMO UN ARRAY DE OBJETOS
        //  No uses comillas dobles alrededor del array.
        //  Solo copia y pega entre los corchetes.
        // ============================================================
        const preguntas = [
            {
                "id": 1,
                "pregunta": "¿Qué parte de la neurona es responsable de la integración de los potenciales\ngraduados para iniciar el impulso eléctrico?\n",
                "opciones": [
                    "a) El cono axónico, lugar donde se alcanza el umbral.\n",
                    "b) Las dendritas basales del árbol somático distal.\n",
                    "c) El botón sináptico de la zona terminal aferente.\n",
                    "d) La membrana plasmática del cuerpo celular interno.\n"
                ],
                "respuesta_correcta": "a"
            },
            {
                "id": 2,
                "pregunta": "¿Qué estructura especializada de la neurona se encarga de recibir la mayor\nparte de las señales químicas (neurotransmisores) provenientes de otras\nneuronas?\n",
                "opciones": [
                    "a) El axón mielinizado.\n",
                    "b) Las dendritas.\n",
                    "c) Las células de Schwann.\n",
                    "d) El nodo de Ranvier.\n"
                ],
                "respuesta_correcta": "b"
            },
            {
                "id": 3,
                "pregunta": "¿Cuál es el mecanismo biológico principal que permite que el cerebro\nconsolide el conocimiento mediante cambios en la conectividad?\n",
                "opciones": [
                    "a) Transmisión saltatoria en las fibras mielínicas densas.\n",
                    "b) Flujo de iones calcio por canales dependientes de voltaje.\n",
                    "c) Plasticidad sináptica, mediante el proceso de potenciación.\n",
                    "d) Síntesis proteica en el retículo endoplasmático rugoso.\n"
                ],
                "respuesta_correcta": "c"
            },
            {
                "id": 4,
                "pregunta": "¿Qué principio biológico describe que el conocimiento se refuerza cuando\ndos neuronas se activan de forma simultánea y repetida, fortaleciendo su\nconexión?\n",
                "opciones": [
                    "a) La ley del todo o nada.\n",
                    "b) La regla de Hebb (\"Células que se disparan juntas, se conectan juntas\").\n",
                    "c) El periodo refractario absoluto.\n",
                    "d) La homeostasis celular.\n"
                ],
                "respuesta_correcta": "b"
            },
            {
                "id": 5,
                "pregunta": "En el modelo matemático del perceptrón simple, ¿cuál es la función específica\nde los pesos (𝑤) asociados a las señales de entrada?\n",
                "opciones": [
                    "a) Establecer el valor máximo de la función sigmoide.\n",
                    "b) Ponderar la entrada, determinando su importancia relativa.\n",
                    "c) Definir el sesgo estático de la arquitectura neuronal.\n",
                    "d) Normalizar el vector de datos antes de la sumatoria.\n"
                ],
                "respuesta_correcta": "b"
            },
            {
                "id": 6,
                "pregunta": "¿Qué limitación lógica fundamental presentan los perceptrones que utilizan\nuna función de activación lineal o escalón?\n",
                "opciones": [
                    "a) La falta de retropropagación del error durante el entrenamiento.\n",
                    "b) El uso exclusivo de valores de salida discretos o binarios.\n",
                    "c) La incapacidad de converger ante tasas de aprendizaje bajas.\n",
                    "d) Solo pueden clasificar datos linealmente separables.\n"
                ],
                "respuesta_correcta": "d"
            },
            {
                "id": 7,
                "pregunta": "¿Qué hace una neurona artificial al recibir una entrada?\n",
                "opciones": [
                    "a) Solo la multiplica por un número fijo.\n",
                    "b) La almacena en una memoria interna.\n",
                    "c) La suma con otras entradas, aplica un peso y luego una función de\nactivación.\n",
                    "d) La envía directamente a la siguiente capa sin cambios.\n"
                ],
                "respuesta_correcta": "c"
            },
            {
                "id": 8,
                "pregunta": "¿Cómo se forma el \"conocimiento\" en una red de neuronas artificiales?\n",
                "opciones": [
                    "a) Guardando cada dato en una neurona distinta.\n",
                    "b) Siguiendo instrucciones escritas por el programador.\n",
                    "c) Modificando la fuerza de las conexiones según los aciertos y fallos.\n",
                    "d) Copiando la información desde una base de datos externa.\n"
                ],
                "respuesta_correcta": "c"
            },
            {
                "id": 9,
                "pregunta": "¿Cuál es una limitación característica del perceptrón básico de una capa?\n",
                "opciones": [
                    "a) Emplea varias capas ocultas para aprender funciones complejas.\n",
                    "b) Su arquitectura incluye conexiones recurrentes hacia atrás.\n",
                    "c) Se basa en una función de activación escalón y un umbral ajustable.\n",
                    "d) Utiliza la regla de la cadena para actualizar los pesos internos.\n"
                ],
                "respuesta_correcta": "c"
            },
            {
                "id": 10,
                "pregunta": "¿Qué regla sigue la actualización de pesos en el entrenamiento del\nperceptrón?\n",
                "opciones": [
                    "a) Los pesos se reducen en un porcentaje fijo en cada iteración.\n",
                    "b) Se añade un valor aleatorio a cada peso para explorar el espacio.\n",
                    "c) El cambio en cada peso es proporcional al error cometido y su entrada.\n",
                    "d) Los pesos permanecen constantes después de la inicialización.\n"
                ],
                "respuesta_correcta": "c"
            },
            {
                "id": 11,
                "pregunta": "¿Qué representa la salida de una neurona artificial después del\nprocesamiento?\n",
                "opciones": [
                    "a) El resultado generado a partir de las entradas.\n",
                    "b) El conjunto de pesos utilizados inicialmente.\n",
                    "c) La cantidad de neuronas presentes en la re",
                    "d)  D. El valor asignado antes del entrenamiento.\n"
                ],
                "respuesta_correcta": "a"
            },
            {
                "id": 12,
                "pregunta": "¿Por qué las conexiones entre neuronas artificiales son importantes para el\naprendizaje?\n",
                "opciones": [
                    "a) Permiten transmitir información con distinta importancia.\n",
                    "b) Definen únicamente el tamaño físico de la red.\n",
                    "c) Determinar la velocidad del procesador utilizado.\n",
                    "d) Controlan el almacenamiento de archivos del sistema.\n"
                ],
                "respuesta_correcta": "a"
            },
            {
                "id": 13,
                "pregunta": "¿En qué principio está basado el diseño del perceptrón?\n",
                "opciones": [
                    "a) En el comportamiento básico de una neurona biológica.\n",
                    "b) En el funcionamiento de una memoria digital.\n",
                    "c) En la arquitectura de un procesador moderno.\n",
                    "d) En el diseño de una base de datos relacional.\n"
                ],
                "respuesta_correcta": "a"
            },
            {
                "id": 14,
                "pregunta": "¿Qué representa el conocimiento en una red neuronal artificial?\n",
                "opciones": [
                    "a) Los patrones aprendidos mediante el entrenamiento.\n",
                    "b) La cantidad total de neuronas implementadas.\n",
                    "c) El número de funciones de activación disponibles.\n",
                    "d) La velocidad de procesamiento del computador.\n"
                ],
                "respuesta_correcta": "a"
            },
            {
                "id": 15,
                "pregunta": "¿Qué es el \"Bias\" (sesgo) en una neurona artificial?\n",
                "opciones": [
                    "a) Una barrera que impide que la información fluya entre capas.\n",
                    "b) Cantidad de neuronas que fallan durante una ejecución.\n",
                    "c) Decisión aleatoria tomada por el algoritmo al inicio.\n",
                    "d) Offset o valor sumatorio adicional que desplaza la función de activación.\n"
                ],
                "respuesta_correcta": "d"
            },
            {
                "id": 16,
                "pregunta": "¿Cuál es la función principal de la \"función de activación\" en una red\nmulticapa?\n",
                "opciones": [
                    "a) Borrar los errores de cálculo en la capa de salida.\n",
                    "b) Clasificar los datos antes de que entren a la red.\n",
                    "c) Añadir no linealidad al modelo para capturar patrones complejos.\n",
                    "d) Definir cuántas capas debe tener la arquitectura.\n"
                ],
                "respuesta_correcta": "c"
            },
            {
                "id": 17,
                "pregunta": "¿Qué define al fenómeno de \"Overfitting\" o sobreajuste?\n",
                "opciones": [
                    "a) Bajada drástica del rendimiento debido a falta de datos.\n",
                    "b) Configuración incorrecta de los parámetros de hardware.\n",
                    "c) Descarte automático de las capas ocultas por la re",
                    "d)  D. Identificación excesiva de detalles irrelevantes del conjunto de\nentrenamiento.\n"
                ],
                "respuesta_correcta": "d"
            },
            {
                "id": 18,
                "pregunta": "¿Qué arquitectura es ideal para procesar imágenes con estructura de rejilla?\n",
                "opciones": [
                    "a) Bloques de memoria de corto plazo.\n",
                    "b) Circuitos integrados de aprendizaje simple.\n",
                    "c) Datos de entrada estructurados linealmente.\n",
                    "d) Unidades Convolucionales (CNN).\n"
                ],
                "respuesta_correcta": "d"
            },
            {
                "id": 19,
                "pregunta": "¿Cuál es la principal ventaja de añadir capas ocultas en un Perceptrón\nMulticapa?\n",
                "opciones": [
                    "a) Es capaz de aprender funciones no lineales complejas.\n",
                    "b) Borra la necesidad de usar funciones de activación.\n",
                    "c) Convierte automáticamente el modelo en una red convolucional.\n",
                    "d) Disminuye drásticamente el tiempo de entrenamiento.\n"
                ],
                "respuesta_correcta": "a"
            },
            {
                "id": 20,
                "pregunta": "¿Qué sucede si un Perceptrón Multicapa no utiliza funciones de activación\nno lineales?\n",
                "opciones": [
                    "a) Baja su precisión en problemas complejos.\n",
                    "b) Comporta un gasto innecesesiario de memoria.\n",
                    "c) Detiene el proceso de entrenamiento.\n",
                    "d) Se iguala matemáticamente a una transformación lineal simple, perdiendo\nsu potencia.\n"
                ],
                "respuesta_correcta": "d"
            },
            {
                "id": 21,
                "pregunta": "En la arquitectura de un MLP, ¿cómo se conectan las neuronas entre capas?\n",
                "opciones": [
                    "a) Bloques de conexión aleatorios.\n",
                    "b) Canales de comunicación unidireccionales.\n",
                    "c) Distribución de datos paralelos.\n",
                    "d) Uniones densamente conectadas entre cada par de capas consecutivas.\n"
                ],
                "respuesta_correcta": "d"
            },
            {
                "id": 22,
                "pregunta": "¿Qué problema clásico de lógica el Perceptrón Multicapa puede resolver, a\ndiferencia del simple?\n",
                "opciones": [
                    "a) Cálculo de sumas binarias.\n",
                    "b) Comparación de datos idénticos.\n",
                    "c) Detección de patrones lineales.\n",
                    "d) Operación lógica XOR (O exclusivo).\n"
                ],
                "respuesta_correcta": "d"
            },
            {
                "id": 23,
                "pregunta": "¿Qué nombre recibe el proceso por el cual el error se propaga hacia atrás\npara ajustar los pesos?\n",
                "opciones": [
                    "a) Convolución de gradientes descendentes.\n",
                    "b) Desplazamiento lineal de los parámetros.\n",
                    "c) Flujo de datos hacia adelante.\n",
                    "d) Error Backpropagation (Retropropagación).\n"
                ],
                "respuesta_correcta": "d"
            },
            {
                "id": 24,
                "pregunta": "¿Qué controla el \"Learning Rate\" (tasa de aprendizaje) en el entrenamiento?\n",
                "opciones": [
                    "a) Bloquea las actualizaciones de peso si el error es muy alto.\n",
                    "b) Crea una copia de seguridad de los datos de entrenamiento.\n",
                    "c) Establece la magnitud de los cambios en los pesos durante la optimización.\n",
                    "d) Determina el tiempo exacto en segundos que dura el proceso.\n"
                ],
                "respuesta_correcta": "c"
            },
            {
                "id": 25,
                "pregunta": "¿Cuál es el propósito fundamental del algoritmo de descenso del gradiente\nen el entrenamiento de modelos?\n",
                "opciones": [
                    "a) Eludir o minimizar la diferencia entre los resultados previstos y los reales.\n",
                    "b) Prolongar la cantidad de épocas de entrenamiento de forma infinita.\n",
                    "c) Maximizar la complejidad de los parámetros generales del modelo.\n",
                    "d) Suprimir la necesidad de utilizar una métrica de función de pérdida.\n"
                ],
                "respuesta_correcta": "a"
            },
            {
                "id": 26,
                "pregunta": "Si un modelo utiliza una tasa de aprendizaje (∝) demasiado elevada, ¿qué\nriesgo principal enfrenta?\n",
                "opciones": [
                    "a) Garantizar una precisión absoluta en menos de una sola época.\n",
                    "b) Generar que los gradientes se vuelvan nulos de forma prematura.\n",
                    "c) Causar que el algoritmo tarde demasiado en procesar cada iteración.\n",
                    "d) Oscilar y sobrepasar de largo el mínimo de la función de costo.\n"
                ],
                "respuesta_correcta": "d"
            },
            {
                "id": 27,
                "pregunta": "¿Qué caracteriza al Descenso de Gradiente Estocástico (SGD) en\ncomparación con la variante por lotes (Batch)?\n",
                "opciones": [
                    "a) Requerir almacenar todo el conjunto de datos en la memoria temporal.\n",
                    "b) Actualizar los parámetros tras evaluar cada ejemplo individualmente.\n",
                    "c) Generar un gradiente de error que resulta más estable y constante.\n",
                    "d) Concretar actualizaciones después de completar una época entera.\n"
                ],
                "respuesta_correcta": "b"
            },
            {
                "id": 28,
                "pregunta": "En el contexto de problemas no convexos, ¿qué es un punto de silla?\n",
                "opciones": [

        // ============================================================

        (function () {
            'use strict';

            // Verificar que las preguntas existan
            if (!Array.isArray(preguntas) || preguntas.length === 0) {
                alert('No se encontraron preguntas. Revisa el contenido de la variable "preguntas".');
                return;
            }

            // Referencias DOM
            const quizContent = document.getElementById('quizContent');
            const counter = document.getElementById('counter');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const questionText = document.getElementById('questionText');
            const optionsList = document.getElementById('optionsList');
            const feedback = document.getElementById('feedback');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const progressText = document.getElementById('progressText');
            const resultArea = document.getElementById('resultArea');
            const finalScore = document.getElementById('finalScore');
            const totalQuestionsSpan = document.getElementById('totalQuestions');
            const restartBtn = document.getElementById('restartBtn');

            let indiceActual = 0;
            let aciertos = 0;
            let respondida = false;
            let respuestasUsuario = [];

            function renderPregunta() {
                const q = preguntas[indiceActual];
                if (!q) return;

                counter.textContent = `Pregunta ${indiceActual + 1} / ${preguntas.length}`;
                progressText.textContent = `${indiceActual + 1} / ${preguntas.length}`;
                scoreDisplay.textContent = `✅ ${aciertos} aciertos`;
                questionText.textContent = q.pregunta;

                optionsList.innerHTML = '';
                const letras = ['a', 'b', 'c', 'd'];
                q.opciones.forEach((texto, idx) => {
                    const li = document.createElement('li');
                    const btn = document.createElement('button');
                    btn.textContent = texto;
                    btn.dataset.idx = idx;
                    btn.addEventListener('click', () => {
                        if (respondida) return;
                        manejarSeleccion(idx);
                    });
                    li.appendChild(btn);
                    optionsList.appendChild(li);
                });

                feedback.className = 'feedback';
                feedback.style.display = 'none';
                feedback.textContent = '';
                respondida = false;

                document.querySelectorAll('#optionsList button').forEach(btn => {
                    btn.disabled = false;
                    btn.className = '';
                });

                // Restaurar respuesta previa si existe
                if (respuestasUsuario[indiceActual] !== undefined) {
                    const resp = respuestasUsuario[indiceActual];
                    const idx = resp.seleccionada;
                    const qActual = preguntas[indiceActual];
                    const letraCorrecta = qActual.respuesta_correcta;
                    const buttons = document.querySelectorAll('#optionsList button');
                    buttons.forEach((btn, i) => {
                        btn.disabled = true;
                        const letter = letras[i];
                        if (i === idx) {
                            btn.classList.add(resp.correcta ? 'selected-correct' : 'selected-incorrect');
                        }
                        if (letter === letraCorrecta) {
                            btn.classList.add('show-correct');
                        }
                    });
                    respondida = true;
                    feedback.style.display = 'block';
                    feedback.className = 'feedback ' + (resp.correcta ? 'correct' : 'incorrect');
                    feedback.textContent = resp.correcta ? '✅ ¡Correcto!' : '❌ Incorrecto. La respuesta correcta era ' + letraCorrecta.toUpperCase() + '.';
                }

                actualizarBotones();
            }

            function manejarSeleccion(idx) {
                if (respondida) return;
                const q = preguntas[indiceActual];
                const letras = ['a', 'b', 'c', 'd'];
                const letraSeleccionada = letras[idx];
                const letraCorrecta = q.respuesta_correcta;
                const esCorrecto = (letraSeleccionada === letraCorrecta);

                respuestasUsuario[indiceActual] = { seleccionada: idx, correcta: esCorrecto };
                if (esCorrecto) aciertos++;
                scoreDisplay.textContent = `✅ ${aciertos} aciertos`;

                feedback.style.display = 'block';
                feedback.className = 'feedback ' + (esCorrecto ? 'correct' : 'incorrect');
                feedback.textContent = esCorrecto ? '✅ ¡Correcto!' : '❌ Incorrecto. La respuesta correcta era ' + letraCorrecta.toUpperCase() + '.';

                const buttons = document.querySelectorAll('#optionsList button');
                buttons.forEach((btn, i) => {
                    btn.disabled = true;
                    const letter = letras[i];
                    if (i === idx) {
                        btn.classList.add(esCorrecto ? 'selected-correct' : 'selected-incorrect');
                    }
                    if (letter === letraCorrecta) {
                        btn.classList.add('show-correct');
                    }
                });

                respondida = true;
                actualizarBotones();
            }

            function actualizarBotones() {
                prevBtn.disabled = (indiceActual === 0);
                nextBtn.textContent = (indiceActual === preguntas.length - 1) ? 'Finalizar' : 'Siguiente ➡';
            }

            function avanzar() {
                if (indiceActual === preguntas.length - 1) {
                    if (!respondida) {
                        alert('Debes responder la pregunta antes de finalizar.');
                        return;
                    }
                    mostrarResultados();
                    return;
                }
                if (!respondida) {
                    alert('Responde la pregunta antes de continuar.');
                    return;
                }
                indiceActual++;
                renderPregunta();
            }

            function retroceder() {
                if (indiceActual === 0) return;
                indiceActual--;
                renderPregunta();
            }

            function mostrarResultados() {
                quizContent.style.display = 'none';
                resultArea.style.display = 'block';
                finalScore.textContent = aciertos;
                totalQuestionsSpan.textContent = preguntas.length;
            }

            function reiniciar() {
                indiceActual = 0;
                aciertos = 0;
                respuestasUsuario = [];
                resultArea.style.display = 'none';
                quizContent.style.display = 'block';
                renderPregunta();
                actualizarBotones();
            }

            nextBtn.addEventListener('click', avanzar);
            prevBtn.addEventListener('click', retroceder);
            restartBtn.addEventListener('click', reiniciar);

            // Iniciar
            renderPregunta();
            actualizarBotones();
        })();
    </script>
